<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empire Clash | Imperial Military Archives</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
    <style>
        @keyframes siteEntrance {
            from { opacity: 0; transform: scale(0.98) translateY(30px); filter: blur(15px); }
            to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        @keyframes lanternShake {
            0%, 100% { transform: translateX(0) rotateZ(-2deg); }
            25% { transform: translateX(-8px) rotateZ(-3deg); }
            50% { transform: translateX(0) rotateZ(0deg); }
            75% { transform: translateX(8px) rotateZ(3deg); }
        }

        @keyframes particleFloat {
            0% { opacity: 1; transform: translateY(0) translateX(0) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) translateX(var(--tx)) scale(0); }
        }

        @keyframes fallDown {
            0% { opacity: 1; transform: translateY(0) rotateZ(0deg); }
            100% { opacity: 0; transform: translateY(400px) rotateZ(720deg); }
        }

        @keyframes slideIn {
            0% { opacity: 1; }
            100% { opacity: 1; }
        }

        @keyframes dustPuff {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--dust-x), var(--dust-y)) scale(0.3); }
        }

        body { 
            font-family: 'IM Fell English', serif; 
            background: #0f0c08 url('https://www.transparenttextures.com/patterns/dark-rock.png'); 
            color: #dcdcdc; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            overflow-x: hidden;
            transition: background 0.6s ease, color 0.6s ease;
        }

        body.dark-mode {
            background: #000000 url('https://www.transparenttextures.com/patterns/dark-rock.png');
            filter: brightness(0.7);
        }

        body.light-mode {
            background: #e8dcc4 url('https://www.transparenttextures.com/patterns/dark-rock.png');
            color: #2a2420;
            filter: brightness(1.2);
        }

        #main-blur { width: 100%; display: flex; justify-content: center; transition: filter 0.6s ease; }

        .container { 
            background: rgba(25, 20, 15, 0.98); 
            padding: 40px; 
            width: 100%; 
            max-width: 650px; 
            border: 4px solid #8c734c; 
            text-align: center; 
            box-shadow: 0 0 60px rgba(0,0,0,0.9); 
            position: relative; 
            animation: siteEntrance 1.8s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            transition: background 0.6s ease;
        }

        body.dark-mode .container {
            background: rgba(10, 8, 5, 0.98);
            border-color: #5c4a31;
        }

        body.light-mode .container {
            background: rgba(240, 235, 220, 0.98);
            border-color: #c9a063;
            box-shadow: 0 0 60px rgba(201, 160, 99, 0.3);
        }

        body.light-mode h1 {
            color: #8c734c;
        }

        body.light-mode .subtitle {
            color: #c9a063;
            border-bottom-color: #8c734c;
        }

        body.light-mode .tab-btn {
            background: #f5f0e6;
            border-color: #c9a063;
            color: #8c734c;
        }

        body.light-mode .tab-btn.active {
            background: #c9a063;
            color: #f5f0e6;
        }

        body.light-mode input {
            background: #f5f0e6;
            border-color: #c9a063;
            color: #8c734c;
        }

        body.light-mode .stat-label {
            color: #8c734c;
        }

        body.light-mode .stat-value {
            color: #c9a063;
        }

        h1 { font-family: 'Cinzel', serif; color: #c9a063; letter-spacing: 5px; text-transform: uppercase; margin: 0; }
        .subtitle { font-family: 'Cinzel', serif; color: #8c734c; font-size: 0.8rem; margin-bottom: 25px; border-bottom: 1px solid #c9a063; display: inline-block; padding-bottom: 5px; }

        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab-btn { flex: 1; padding: 15px; background: #1a1510; border: 1px solid #5c4a31; color: #8c734c; cursor: pointer; font-family: 'Cinzel', serif; font-size: 0.8rem; transition: 0.4s; text-transform: uppercase; letter-spacing: 2px; }
        .tab-btn.active { background: #8c734c; color: #1a1510; font-weight: bold; }

        .section { display: none; text-align: left; animation: siteEntrance 0.8s ease; }
        .section.active { display: block; }

        input { width: 100%; padding: 12px; background: #120f0a; border: 1px solid #5c4a31; color: #f0e68c; font-family: 'Cinzel', serif; margin-top: 5px; box-sizing: border-box; outline: none; }

        .suggestions-list { 
            position: absolute; top: 100%; left: 0; width: 100%; 
            background: #1a1510; border: 1px solid #c9a063; 
            z-index: 100; display: none; max-height: 200px; overflow-y: auto;
        }
        .suggestion-item { padding: 12px; color: #c9a063; cursor: pointer; font-size: 0.85rem; border-bottom: 1px solid rgba(140, 115, 76, 0.2); }
        .suggestion-item:hover { background: #8c734c; color: #1a1510; }

        .submit-btn { width: 100%; padding: 15px; margin-top: 20px; background: linear-gradient(45deg, #8c734c, #5c4a31); color: #1a1510; border: 1px solid #c9a063; font-family: 'Cinzel', serif; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.4s; }

        .leaderboard-controls { margin-bottom: 15px; display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; border-bottom: 1px solid rgba(140, 115, 76, 0.2); }
        .lb-filter-btn { background: #1a1510; border: 1px solid #5c4a31; color: #c9a063; padding: 8px 12px; font-size: 0.6rem; cursor: pointer; font-family: 'Cinzel', serif; white-space: nowrap; transition: 0.3s; }
        .lb-filter-btn.active { border-color: #f0e68c; color: #f0e68c; background: rgba(140, 115, 76, 0.1); }

        .lb-table { width: 100%; border-collapse: separate; border-spacing: 0 5px; font-size: 0.85rem; background: transparent; }
        .lb-table th { background: #8c734c; color: #1a1510; font-family: 'Cinzel', serif; padding: 12px 10px; text-align: left; text-transform: uppercase; letter-spacing: 1px; }
        .lb-table td { padding: 12px 10px; background: rgba(30, 25, 20, 0.6); border-top: 1px solid rgba(140, 115, 76, 0.1); border-bottom: 1px solid rgba(140, 115, 76, 0.1); }
        .lb-rank { color: #8c734c; font-weight: bold; width: 50px; text-align: center; border-left: 2px solid #8c734c; }
        .lb-name { color: #dcdcdc; letter-spacing: 1px; }
        .lb-value { color: #f0e68c; text-align: right; font-weight: bold; padding-right: 15px !important; }

        .footer { margin-top: 35px; border-top: 1px solid rgba(140,115,76,0.3); padding-top: 20px; text-align: center; }
        .developer-credit { font-family: 'Cinzel', serif; font-size: 0.65rem; color: #5c4a31; text-transform: uppercase; letter-spacing: 3px; margin-top: 12px; }
        .discord-link { color: #c9a063; text-decoration: none; font-family: 'Cinzel', serif; font-weight: bold; font-size: 0.85rem; }

        .stat-line { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(140,115,76,0.2); padding: 8px 0; font-size: 0.85rem; }
        .stat-label { color: #8c734c; }
        .stat-value { color: #f0e68c; font-weight: bold; }

        /* Lantern Styles */
        .lantern-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            cursor: pointer;
            animation: lanternShake 4s ease-in-out infinite;
        }

        .chain {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 30px;
            background: linear-gradient(180deg, rgba(192, 164, 80, 0.6) 0%, rgba(192, 164, 80, 0.3) 100%);
            box-shadow: 0 0 8px rgba(201, 160, 99, 0.4);
        }

        .lantern-body {
            position: relative;
            width: 50px;
            height: 60px;
            background: linear-gradient(135deg, #2a2415 0%, #1a1410 50%, #2a2415 100%);
            border: 2px solid #8c734c;
            border-radius: 8px 8px 20px 20px;
            box-shadow: 0 0 30px rgba(201, 160, 99, 0.4), inset 0 0 15px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        .lantern-body::before {
            content: '';
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            height: 20px;
            background: linear-gradient(180deg, rgba(201, 160, 99, 0.3) 0%, transparent 100%);
            border-radius: 4px;
        }

        .lantern-body::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 15px solid #1a1410;
            opacity: 0.8;
        }

        .lantern-light {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, rgba(240, 230, 140, 0.6) 0%, rgba(201, 160, 99, 0.3) 70%, transparent 100%);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(240, 230, 140, 0.5), 0 0 40px rgba(201, 160, 99, 0.3);
        }

        .particle {
            position: fixed;
            pointer-events: none;
        }

        /* Shatter Effect */
        .breaking-letter {
            position: fixed;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            font-size: 2.5rem;
            color: #c9a063;
            text-shadow: 0 0 15px rgba(201, 160, 99, 0.9);
            pointer-events: none;
            z-index: 400;
        }

        .incoming-letter {
            position: fixed;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            font-size: 2.5rem;
            color: #f0e68c;
            text-shadow: 0 0 15px rgba(240, 230, 140, 0.9);
            pointer-events: none;
            z-index: 399;
        }

        .dust-particle {
            position: fixed;
            pointer-events: none;
            z-index: 401;
            border-radius: 50%;
        }

        @media (max-width: 600px) { 
            .leaderboard-controls { justify-content: flex-start; }
            .lantern-container {
                top: 10px;
                right: 10px;
            }
            .lantern-body {
                width: 40px;
                height: 50px;
            }
        }
    </style>
</head>
<body>

<div id="main-blur">
    <div class="container">
        <h1>Empire Clash</h1>
        <div class="subtitle">Imperial Military Archives</div>

        <div class="tabs">
            <button class="tab-btn active" id="btnSearch" onclick="showSection('search')">Search Archives</button>
            <button class="tab-btn" id="btnLeaderboard" onclick="showSection('leaderboard')">Leaderboards</button>
        </div>

        <div id="searchSection" class="section active">
            <div style="position:relative;">
                <input type="text" id="searchName" placeholder="Enter Soldier Name..." oninput="handleAutocomplete()" autocomplete="off">
                <div id="suggestions" class="suggestions-list"></div>
            </div>
            <button class="submit-btn" onclick="searchSoldier()">Consult Archives</button>
            <div id="searchResult" style="display:none; margin-top:20px; border:1px solid #8c734c; padding:15px; background:rgba(0,0,0,0.5);">
                <div id="statsOutput"></div>
            </div>
        </div>

        <div id="leaderboardSection" class="section">
            <div class="leaderboard-controls">
                <button class="lb-filter-btn active" onclick="updateLeaderboard('kills', this)">Kills</button>
                <button class="lb-filter-btn" onclick="updateLeaderboard('kd', this)">K/D</button>
                <button class="lb-filter-btn" onclick="updateLeaderboard('winrate', this)">Winrate</button>
                <button class="lb-filter-btn" onclick="updateLeaderboard('mwr', this)">Monarch WR</button>
                <button class="lb-filter-btn" onclick="updateLeaderboard('hours', this)">Hours</button>
                <button class="lb-filter-btn" onclick="updateLeaderboard('wins', this)">Wins</button>
                <button class="lb-filter-btn" onclick="updateLeaderboard('gold', this)">Gold</button>
                <button class="lb-filter-btn" onclick="updateLeaderboard('crowns', this)">Crowns</button>
                <button class="lb-filter-btn" onclick="updateLeaderboard('tournaments', this)">tournaments</button>
            </div>
            <div id="lbContainer">
                <table class="lb-table">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Soldier</th>
                            <th style="text-align:right" id="lbHeader">Kills</th>
                        </tr>
                    </thead>
                    <tbody id="lbBody"></tbody>
                </table>
            </div>
        </div>

        <div class="footer">
            <p style="font-size: 0.75rem; color: #8c734c; margin-bottom: 15px; line-height: 1.6;">
                If you want to add or update your stats, please click on <br>
                <b style="color: #c9a063;">"Join the Imperial Discord"</b> to join our Discord server.
            </p>
            <a href="https://discord.gg/x4djQaBpnQ" target="_blank" class="discord-link">🏰 JOIN THE IMPERIAL DISCORD</a>
            <div class="developer-credit">Developer: sofian_gg</div>
        </div>
    </div>
</div>

<div class="lantern-container" id="lantern" onclick="toggleDarkMode()">
    <div class="chain"></div>
    <div class="lantern-body">
        <div class="lantern-light"></div>
    </div>
</div>

<script>
    // --- SYNTHETIC SOUND ENGINE (Medieval Theme) ---
    const AudioEngine = {
        ctx: null,
        init() {
            if (!this.ctx) {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            }
        },
        // Stone grinding / Click sound
        playClick() {
            this.init();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(150, this.ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            osc.stop(this.ctx.currentTime + 0.1);
        },
        // Light chime for lantern
        playPing() {
            this.init();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, this.ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, this.ctx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            osc.stop(this.ctx.currentTime + 0.3);
        },
        // Heavy thud for shattering
        playShatter() {
            this.init();
            const noise = this.ctx.createBufferSource();
            const buffer = this.ctx.createBuffer(1, this.ctx.sampleRate * 0.2, this.ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < buffer.length; i++) data[i] = Math.random() * 2 - 1;
            noise.buffer = buffer;
            const filter = this.ctx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(400, this.ctx.currentTime);
            const gain = this.ctx.createGain();
            gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(this.ctx.destination);
            noise.start();
        },
        // Whoosh for incoming letters
        playWhoosh() {
            this.init();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(100, this.ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, this.ctx.currentTime + 0.4);
            gain.gain.setValueAtTime(0, this.ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0.05, this.ctx.currentTime + 0.2);
            gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.4);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            osc.stop(this.ctx.currentTime + 0.4);
        }
    };

    const MY_SHEET_ID = "1oQ4GC7sTXCikDYdQLY96CwPSUaeIoOJ3x6mYUjlZuYI"; 
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/${MY_SHEET_ID}/gviz/tq?tqx=out:json`;
    let verifiedSoldiers = {};
    let isDarkMode = true;

    function showSection(id) {
        AudioEngine.playClick();
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id + 'Section').classList.add('active');
        document.getElementById('btn' + id.charAt(0).toUpperCase() + id.slice(1)).classList.add('active');
        if(id === 'leaderboard') updateLeaderboard('kills');
    }

    const getNum = (cell) => {
        if (!cell) return 0;
        let val = cell.v !== null && cell.v !== undefined ? cell.v : cell.f;
        return parseFloat(val) || 0;
    };

    async function fetchStats() {
        try {
            const response = await fetch(SHEET_URL);
            const text = await response.text();
            const json = JSON.parse(text.substr(47).slice(0, -2));
            const rows = json.table.rows;
            verifiedSoldiers = {};

            rows.forEach(row => {
                const nameCell = row.c[0];
                const name = nameCell?.v?.toString() || nameCell?.f?.toString();

                if (name && name.toLowerCase() !== "name") {
                    const wins = getNum(row.c[5]);
                    const monarchWins = getNum(row.c[9]);

                    verifiedSoldiers[name.toLowerCase()] = {
                        originalName: name,
                        kills: getNum(row.c[1]), 
                        deaths: getNum(row.c[2]) || 1, 
                        gold: getNum(row.c[3]),
                        crowns: getNum(row.c[4]),
                        wins: wins, 
                        losses: getNum(row.c[6]), 
                        hours: parseFloat(row.c[7]?.v) || 0, 
                        buried: getNum(row.c[8]),
                        monarch: monarchWins,
                        tournaments: getNum(row.c[10]),
                        mwr: parseFloat(((monarchWins / (wins || 1)) * 100).toFixed(1)),
                        lastUpdate: row.c[11]?.f || row.c[11]?.v || "Never",
                        kd: parseFloat((getNum(row.c[1]) / (getNum(row.c[2]) || 1)).toFixed(2)),
                        winrate: parseFloat(((wins / (wins + getNum(row.c[6]) || 1)) * 100).toFixed(1))
                    };
                }
            });
            updateLeaderboard('kills');
        } catch (e) { 
            console.error("Fetch error:", e); 
        }
    }
    fetchStats();

    function updateLeaderboard(statKey, btn) {
        if(btn) {
            AudioEngine.playClick();
            document.querySelectorAll('.lb-filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        const headerTitle = btn ? btn.innerText : statKey.toUpperCase();
        document.getElementById('lbHeader').innerText = headerTitle;
        const lbBody = document.getElementById('lbBody');
        if (!lbBody) return;
        lbBody.innerHTML = '';
        const sorted = Object.values(verifiedSoldiers).sort((a, b) => (b[statKey] || 0) - (a[statKey] || 0)).slice(0, 15);
        sorted.forEach((player, index) => {
            let val = player[statKey];
            if(statKey === 'winrate' || statKey === 'mwr') val = val + "%";
            else if (statKey === 'kd') val = val.toFixed(2);
            else if (typeof val === 'number') val = val.toLocaleString();
            const tr = document.createElement('tr');
            tr.innerHTML = `<td class="lb-rank">#${index + 1}</td><td class="lb-name">${player.originalName}</td><td class="lb-value">${val}</td>`;
            lbBody.appendChild(tr);
        });
    }

    function handleAutocomplete() {
        const input = document.getElementById('searchName').value.toLowerCase();
        const box = document.getElementById('suggestions');
        box.innerHTML = '';
        if (input.length < 1) { box.style.display = 'none'; return; }
        const matches = Object.keys(verifiedSoldiers).filter(n => n.includes(input));
        if (matches.length > 0) {
            box.style.display = 'block';
            matches.forEach(m => {
                const d = document.createElement('div');
                d.classList.add('suggestion-item');
                d.innerText = verifiedSoldiers[m].originalName.toUpperCase();
                d.onclick = () => {
                    document.getElementById('searchName').value = verifiedSoldiers[m].originalName;
                    box.style.display = 'none';
                    searchSoldier();
                };
                box.appendChild(d);
            });
        } else { box.style.display = 'none'; }
    }

    function searchSoldier() {
        AudioEngine.playClick();
        const input = document.getElementById('searchName').value.trim().toLowerCase();
        const data = verifiedSoldiers[input];
        const res = document.getElementById('searchResult');
        const out = document.getElementById('statsOutput');
        if(data) {
            res.style.display = 'block';
            let html = `<div style="text-align:center; color:#8c734c; font-size:0.7rem; margin-bottom:10px; border-bottom:1px dashed #8c734c; padding-bottom:5px;">LAST ARCHIVE UPDATE: ${data.lastUpdate}</div>`;
            html += `<div class="stat-line"><span class="stat-label">Soldier</span><span class="stat-value" style="color:#c9a063">${data.originalName.toUpperCase()}</span></div>`;
            const statsLayout = [
                { label: 'KILLS', val: data.kills }, { label: 'DEATHS', val: data.deaths },
                { label: 'KD', val: data.kd }, { label: 'WINS', val: data.wins },
                { label: 'LOSSES', val: data.losses }, { label: 'WINRATE', val: data.winrate + "%" },
                { label: 'HOURS', val: data.hours }, { label: 'GOLD', val: data.gold.toLocaleString() },
                { label: 'CROWNS', val: data.crowns.toLocaleString() }, 
                { label: 'MONARCH WINS', val: data.monarch },
                { label: 'MONARCH WR', val: data.mwr + "%" },
                { label: 'tournaments', val: data.tournaments },
                { label: 'BURIED', val: data.buried }
            ];
            statsLayout.forEach(s => { html += `<div class="stat-line"><span class="stat-label">${s.label}</span><span class="stat-value">${s.val}</span></div>`; });
            out.innerHTML = html;
        } else { alert("Soldier not found in the archives!"); }
    }

    function toggleDarkMode() {
        AudioEngine.playPing();
        isDarkMode = !isDarkMode;
        if (isDarkMode) {
            document.body.classList.remove('light-mode');
            document.body.classList.add('dark-mode');
        } else {
            document.body.classList.remove('dark-mode');
            document.body.classList.add('light-mode');
        }
        createParticles();
    }

    function createParticles() {
        const lantern = document.getElementById('lantern');
        const rect = lantern.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        for (let i = 0; i < 12; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 6 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = centerX + 'px';
            particle.style.top = centerY + 'px';
            particle.style.background = `radial-gradient(circle, #f0e68c, #c9a063)`;
            particle.style.borderRadius = '50%';
            particle.style.boxShadow = `0 0 ${size * 2}px rgba(201, 160, 99, 0.8)`;
            const angle = (Math.PI * 2 * i) / 12;
            const velocity = Math.random() * 3 + 2;
            const tx = Math.cos(angle) * velocity * 40;
            particle.style.setProperty('--tx', tx + 'px');
            particle.style.animation = `particleFloat 1s ease-out forwards`;
            document.body.appendChild(particle);
            setTimeout(() => particle.remove(), 1000);
        }
    }

    function startShatterAnimation() {
        const title = document.querySelector('h1');
        const subtitle = document.querySelector('.subtitle');
        if (!title || !subtitle) return;
        title.style.display = "flex";
        title.style.flexDirection = "column";
        title.style.alignItems = "center";
        function prepareElement(el, isTitle = false) {
            const text = el.innerText;
            el.innerHTML = '';
            if (isTitle) {
                const words = text.split(' ');
                const lines = [];
                words.forEach((word) => {
                    const lineDiv = document.createElement('div');
                    lineDiv.style.whiteSpace = "nowrap";
                    const wordSpans = word.split('').map(char => {
                        const span = document.createElement('span');
                        span.innerText = char;
                        span.style.display = 'inline-block';
                        span.style.position = 'relative';
                        lineDiv.appendChild(span);
                        return span;
                    });
                    el.appendChild(lineDiv);
                    lines.push(...wordSpans);
                });
                return lines;
            } else {
                return text.split('').map(char => {
                    const span = document.createElement('span');
                    span.innerText = char === ' ' ? '\u00A0' : char;
                    span.style.display = 'inline-block';
                    span.style.position = 'relative';
                    el.appendChild(span);
                    return span;
                });
            }
        }
        const titleSpans = prepareElement(title, true);
        const subtitleSpans = prepareElement(subtitle);
        const allSpans = [...titleSpans, ...subtitleSpans].filter(s => s.innerText !== '\u00A0');
        const breakIndices = [];
        const numToBreak = Math.min(8, allSpans.length);
        while(breakIndices.length < numToBreak) {
            const r = Math.floor(Math.random() * allSpans.length);
            if(!breakIndices.includes(r)) breakIndices.push(r);
        }
        breakIndices.forEach((idx, i) => {
            const targetSpan = allSpans[idx];
            const rect = targetSpan.getBoundingClientRect();
            const char = targetSpan.innerText;
            setTimeout(() => {
                targetSpan.style.visibility = 'hidden';
                AudioEngine.playShatter(); // SOUND: Stone breaks
                const breakingLetter = document.createElement('div');
                breakingLetter.classList.add('breaking-letter');
                breakingLetter.textContent = char;
                breakingLetter.style.left = rect.left + 'px';
                breakingLetter.style.top = rect.top + 'px';
                breakingLetter.style.fontSize = window.getComputedStyle(targetSpan).fontSize;
                breakingLetter.style.animation = `fallDown 1.2s ease-in forwards`;
                document.body.appendChild(breakingLetter);
                setTimeout(() => breakingLetter.remove(), 1200);
                setTimeout(() => {
                    AudioEngine.playWhoosh(); // SOUND: Flying in
                    const incomingLetter = document.createElement('div');
                    incomingLetter.classList.add('incoming-letter');
                    incomingLetter.textContent = char;
                    incomingLetter.style.fontSize = window.getComputedStyle(targetSpan).fontSize;
                    const side = Math.floor(Math.random() * 4);
                    let inX, inY;
                    if (side === 0) { inX = Math.random() * window.innerWidth; inY = -50; }
                    else if (side === 1) { inX = window.innerWidth + 50; inY = Math.random() * window.innerHeight; }
                    else if (side === 2) { inX = Math.random() * window.innerWidth; inY = window.innerHeight + 50; }
                    else { inX = -50; inY = Math.random() * window.innerHeight; }
                    incomingLetter.style.left = inX + 'px';
                    incomingLetter.style.top = inY + 'px';
                    document.body.appendChild(incomingLetter);
                    setTimeout(() => {
                        incomingLetter.style.transition = `all 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67)`;
                        incomingLetter.style.left = rect.left + 'px';
                        incomingLetter.style.top = rect.top + 'px';
                    }, 100);
                    setTimeout(() => {
                        AudioEngine.playClick(); // SOUND: Lock into place
                        createDustCloud(rect.left + (rect.width/2), rect.top + (rect.height/2));
                        incomingLetter.remove();
                        targetSpan.style.visibility = 'visible';
                        targetSpan.style.color = '#f0e68c';
                        setTimeout(() => { targetSpan.style.color = ''; }, 600);
                    }, 700);
                }, 2000);
            }, i * 300);
        });
    }

    function createDustCloud(x, y) {
        for (let i = 0; i < 16; i++) {
            const dust = document.createElement('div');
            dust.classList.add('dust-particle');
            const size = Math.random() * 4 + 1;
            dust.style.width = size + 'px';
            dust.style.height = size + 'px';
            dust.style.left = x + 'px';
            dust.style.top = y + 'px';
            dust.style.background = `rgba(140, 115, 76, ${0.5 + Math.random() * 0.5})`;
            dust.style.boxShadow = `0 0 ${size + 2}px rgba(140, 115, 76, 0.8)`;
            const angle = (i / 16) * Math.PI * 2;
            const dist = Math.random() * 100 + 50;
            const dustX = Math.cos(angle) * dist;
            const dustY = Math.sin(angle) * dist;
            dust.style.setProperty('--dust-x', dustX + 'px');
            dust.style.setProperty('--dust-y', dustY + 'px');
            dust.style.animation = `dustPuff 0.7s ease-out forwards`;
            document.body.appendChild(dust);
            setTimeout(() => dust.remove(), 700);
        }
    }

    window.addEventListener('load', () => {
        setTimeout(startShatterAnimation, 1000);
    });

    document.addEventListener('click', (e) => {
        if (!e.target.closest('#searchSection')) {
            document.getElementById('suggestions').style.display = 'none';
        }
    });
</script>
</body>
