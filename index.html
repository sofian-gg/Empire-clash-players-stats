<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empire Clash | Imperial Military Archives</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'IM Fell English', serif; background: #0f0c08 url('https://www.transparenttextures.com/patterns/dark-rock.png'); color: #dcdcdc; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: rgba(25, 20, 15, 0.98); padding: 30px; width: 100%; max-width: 500px; border: 4px solid #8c734c; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.8); position: relative; }
        h1 { font-family: 'Cinzel', serif; color: #c9a063; letter-spacing: 3px; margin-bottom: 5px; text-transform: uppercase; }
        .subtitle { font-family: 'Cinzel', serif; color: #8c734c; font-size: 0.8rem; margin-bottom: 25px; border-bottom: 1px solid #c9a063; display: inline-block; padding-bottom: 5px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab-btn { flex: 1; padding: 12px; background: #1a1510; border: 1px solid #5c4a31; color: #8c734c; cursor: pointer; font-family: 'Cinzel', serif; font-size: 0.7rem; }
        .tab-btn.active { background: #8c734c; color: #1a1510; font-weight: bold; }
        .section { display: none; text-align: left; animation: fadeIn 0.5s ease; }
        .section.active { display: block; }
        
        /* Search Area & Suggestions */
        .search-container { position: relative; width: 100%; }
        input { width: 100%; padding: 12px; background: #120f0a; border: 1px solid #5c4a31; color: #f0e68c; font-family: 'Cinzel', serif; margin-top: 5px; box-sizing: border-box; outline: none; }
        
        .suggestions-list {
            position: absolute; top: 100%; left: 0; width: 100%; background: #1a1510;
            border: 1px solid #8c734c; border-top: none; z-index: 10; display: none;
            max-height: 150px; overflow-y: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .suggestion-item {
            padding: 10px; color: #c9a063; cursor: pointer; font-size: 0.85rem;
            border-bottom: 1px solid rgba(140, 115, 76, 0.2); text-align: left;
        }
        .suggestion-item:hover { background: #8c734c; color: #1a1510; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full-width { grid-column: span 2; }
        label { font-family: 'Cinzel', serif; color: #c9a063; font-size: 0.65rem; margin-top: 10px; text-transform: uppercase; display: flex; align-items: center; gap: 5px; }
        .help-icon { background: #8c734c; color: #1a1510; border-radius: 50%; width: 14px; height: 14px; display: inline-flex; justify-content: center; align-items: center; font-size: 10px; cursor: pointer; }
        .submit-btn { width: 100%; padding: 15px; margin-top: 20px; background: linear-gradient(45deg, #8c734c, #5c4a31); color: #1a1510; border: 1px solid #c9a063; font-family: 'Cinzel', serif; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { width: 90%; max-width: 800px; text-align: center; color: #f0e68c; }
        .steps-container { display: flex; justify-content: space-around; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
        .step-card { background: rgba(25, 20, 15, 0.95); border: 1px solid #8c734c; padding: 20px; flex: 1; min-width: 200px; opacity: 0; transform: translateY(30px); }
        .verified-card { background: rgba(0,0,0,0.5); border: 2px solid #c9a063; padding: 20px; margin-top: 20px; }
        .stat-line { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(140,115,76,0.3); padding: 6px 0; }
        .stat-label { color: #8c734c; font-size: 0.75rem; }
        .stat-value { color: #f0e68c; font-weight: bold; }
        .footer { margin-top: 30px; border-top: 1px solid #5c4a31; padding-top: 15px; text-align: center; }
        .discord-link { color: #c9a063; text-decoration: none; font-family: 'Cinzel', serif; font-weight: bold; }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="modal-overlay" id="helpModal">
    <div class="modal-content">
        <h2 style="font-family: 'Cinzel', serif; color: #c9a063;">How to get Proof URL</h2>
        <div class="steps-container">
            <div class="step-card" id="step1"><h3>Step 1</h3><p>Go to <strong>imgbb.com</strong> and upload screenshot.</p></div>
            <div class="step-card" id="step2"><h3>Step 2</h3><p>Choose <strong>"Direct Link"</strong> in the menu.</p></div>
            <div class="step-card" id="step3"><h3>Step 3</h3><p>Copy URL and paste it here.</p></div>
        </div>
        <p style="margin-top: 30px; color: #8c734c;">Or just join Discord and send it there.</p>
        <button onclick="closeHelp()" style="margin-top:20px; padding:10px 20px; cursor:pointer; font-family:'Cinzel';">Close</button>
    </div>
</div>

<div class="container">
    <h1>Empire Clash</h1>
    <div class="subtitle">Imperial Military Archives</div>

    <div class="tabs">
        <button class="tab-btn active" id="btnSearch" onclick="showSection('search')">Search</button>
        <button class="tab-btn" id="btnSubmit" onclick="showSection('submit')">Submit/Update</button>
    </div>

    <div id="searchSection" class="section active">
        <div class="search-container">
            <input type="text" id="searchName" placeholder="Search for a soldier..." oninput="handleAutocomplete()" autocomplete="off">
            <div id="suggestions" class="suggestions-list"></div>
        </div>
        <button class="submit-btn" onclick="searchSoldier()">Search Archives</button>
        <div id="searchResult" style="display:none;">
            <div class="verified-card"><div id="statsOutput"></div></div>
        </div>
    </div>

    <div id="submitSection" class="section">
        <div class="form-grid">
            <div class="full-width"><label>Roblox Username</label><input type="text" id="subName"></div>
            <div><label>Kills</label><input type="number" id="subKills"></div>
            <div><label>Deaths</label><input type="number" id="subDeaths"></div>
            <div><label>Gold</label><input type="number" id="subGold"></div>
            <div><label>Crowns</label><input type="number" id="subCrowns"></div>
            <div><label>Wins</label><input type="number" id="subWins"></div>
            <div><label>Losses</label><input type="number" id="subLosses"></div>
            <div><label>Time (Hours)</label><input type="number" id="subTime"></div>
            <div><label>Bodies Buried</label><input type="number" id="subBuried"></div>
            <div class="full-width"><label>Proof (ImgBB URL) <span class="help-icon" onclick="openHelp()">?</span></label><input type="text" id="subProof"></div>
        </div>
        <button class="submit-btn" id="finalSubmitBtn" onclick="handleDispatch()">Submit Dispatch</button>
        <p id="msg" style="color: #4CAF50; font-size: 0.8rem; text-align: center; margin-top: 10px; display: none;">📜 Dispatch sent!</p>
    </div>

    <div class="footer"><a href="https://discord.gg/x4djQaBpnQ" target="_blank" class="discord-link">🏰 Join Our Discord</a></div>
</div>

<script src="database.js"></script>

<script>
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1482907096134455348/w5K5LenWpbxAQ3-WfIHO6UumW4-KdkQqoEg1MeuYSwy22D3aPkM_cxts0C8ngngfUfFp";

    // دالة الاقتراحات (Autocomplete)
    function handleAutocomplete() {
        const input = document.getElementById('searchName').value.toLowerCase();
        const suggestionsBox = document.getElementById('suggestions');
        suggestionsBox.innerHTML = '';
        
        if (input.length < 1) {
            suggestionsBox.style.display = 'none';
            return;
        }

        // جلب الأسماء من ملف database.js
        const matches = Object.keys(verifiedSoldiers).filter(name => 
            name.toLowerCase().includes(input)
        );

        if (matches.length > 0) {
            suggestionsBox.style.display = 'block';
            matches.forEach(name => {
                const div = document.createElement('div');
                div.classList.add('suggestion-item');
                div.innerText = name;
                div.onclick = function() {
                    document.getElementById('searchName').value = name;
                    suggestionsBox.style.display = 'none';
                    searchSoldier(); // ابحث فوراً عند الضغط
                };
                suggestionsBox.appendChild(div);
            });
        } else {
            suggestionsBox.style.display = 'none';
        }
    }

    // إغلاق قائمة الاقتراحات عند الضغط في أي مكان آخر
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-container')) {
            document.getElementById('suggestions').style.display = 'none';
        }
    });

    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id + 'Section').classList.add('active');
        document.getElementById(id === 'search' ? 'btnSearch' : 'btnSubmit').classList.add('active');
    }

    function openHelp() {
        document.getElementById('helpModal').style.display = 'flex';
        setTimeout(() => { document.getElementById('step1').style.animation = "slideUp 0.6s forwards"; }, 200);
        setTimeout(() => { document.getElementById('step2').style.animation = "slideUp 0.6s forwards"; }, 600);
        setTimeout(() => { document.getElementById('step3').style.animation = "slideUp 0.6s forwards"; }, 1000);
    }
    function closeHelp() { document.getElementById('helpModal').style.display = 'none'; }

    function searchSoldier() {
        const nameInput = document.getElementById('searchName').value.trim().toLowerCase();
        const data = verifiedSoldiers[nameInput];
        const resDiv = document.getElementById('searchResult');
        const output = document.getElementById('statsOutput');
        if(data) {
            resDiv.style.display = 'block';
            output.innerHTML = `<div class="stat-line"><span class="stat-label">SOLDIER:</span><span class="stat-value">${nameInput.toUpperCase()}</span></div>` + 
            Object.keys(data).map(k => `<div class="stat-line"><span class="stat-label">${k.toUpperCase()}:</span><span class="stat-value">${data[k] || 'Unknown'}</span></div>`).join('');
        } else { alert("No record found."); }
    }

    function handleDispatch() {
        const name = document.getElementById('subName').value;
        const proof = document.getElementById('subProof').value;
        if (!name || !proof) return alert("Name and Proof are mandatory!");
        const btn = document.getElementById('finalSubmitBtn');
        btn.innerText = "Dispatching..."; btn.disabled = true;
        const val = (id) => document.getElementById(id).value.trim() || "Unknown";
        const fields = [
            { name: "Soldier", value: name, inline: true },
            { name: "Kills", value: val('subKills'), inline: true },
            { name: "Deaths", value: val('subDeaths'), inline: true },
            { name: "Gold", value: val('subGold'), inline: true },
            { name: "Crowns", value: val('subCrowns'), inline: true },
            { name: "Wins", value: val('subWins'), inline: true },
            { name: "Losses", value: val('subLosses'), inline: true },
            { name: "Time", value: val('subTime'), inline: true },
            { name: "Buried", value: val('subBuried'), inline: true },
            { name: "Proof", value: proof }
        ];
        fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ embeds: [{ title: "🛡️ New Dispatch", color: 13213795, fields: fields, timestamp: new Date() }] }) })
        .then(() => {
            document.getElementById('msg').style.display = 'block';
            document.querySelectorAll('#submitSection input').forEach(i => i.value = "");
            btn.innerText = "Submit Dispatch"; btn.disabled = false;
        });
    }
</script>
</body>
</html>
