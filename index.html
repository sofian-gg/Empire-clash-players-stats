<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empire Clash | Player Stats</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: radial-gradient(circle, #1e1e2f 0%, #0f0f1a 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: rgba(45, 45, 68, 0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            width: 100%;
            max-width: 400px;
            border: 1px solid #3d3d5c;
            text-align: center;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: #00d2ff;
            font-size: 1.8rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p { color: #b0b0cc; font-size: 0.9rem; margin-bottom: 25px; }

        input {
            width: 90%;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #3d3d5c;
            background: #1a1a2e;
            color: white;
            font-size: 1rem;
            margin-bottom: 15px;
            outline: none;
            transition: border 0.3s;
        }

        input:focus { border-color: #00d2ff; }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:active { transform: scale(0.98); }

        .result {
            margin-top: 25px;
            display: none;
            text-align: left;
            background: #161625;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #00d2ff;
        }

        .stat-item {
            font-size: 1rem;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
        }

        .stat-item span { color: #00ff88; font-weight: bold; }
        .label { color: #b0b0cc; }

    </style>
</head>
<body>

    <div class="container">
        <h1>Empire Clash</h1>
        <p>Enter Roblox Username or ID to see stats</p>
        
        <input type="text" id="playerID" placeholder="Username...">
        <button onclick="getStats()">View Stats</button>

        <div id="resultArea" class="result">
            <div class="stat-item">
                <span class="label">Player:</span>
                <span id="resName">---</span>
            </div>
            <div class="stat-item">
                <span class="label">Kills:</span>
                <span id="resKills">0</span>
            </div>
            <div class="stat-item">
                <span class="label">Playtime:</span>
                <span id="resHours">0h</span>
            </div>
        </div>
    </div>

    <script>
        function getStats() {
            const id = document.getElementById('playerID').value;
            if(!id) {
                alert("Please enter a username!");
                return;
            }

            document.getElementById('resultArea').style.display = 'block';
            
            // Mock data until API is ready
            document.getElementById('resName').innerText = id;
            document.getElementById('resKills').innerText = "Loading..."; 
            document.getElementById('resHours').innerText = "Loading...";
        }
    </script>
</body>
</html>
